<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Student Table Calculator</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: #1e1e2f;
      color: white;
    }

    .card {
      border-radius: 12px;
    }
  </style>
</head>

<body>

  <div class="container mt-5">
    <div class="row">


      <div class="col-md-4">
        <div class="card p-3">
          <h4 class="text-dark">Enter Marks</h4>

          <input id="name" class="form-control mb-2" placeholder="Name">
          <input id="roll" class="form-control mb-2" placeholder="Roll no">
          <input id="m1" type="number" class="form-control mb-2" placeholder="Sub 1">
          <input id="m2" type="number" class="form-control mb-2" placeholder="Sub 2">
          <input id="m3" type="number" class="form-control mb-2" placeholder="Sub 3">
          <input id="m4" type="number" class="form-control mb-2" placeholder="Sub 4">
          <input id="m5" type="number" class="form-control mb-3" placeholder="Sub 5">

          <button id="addBtn" class="btn btn-primary w-100">Submit</button>
        </div>
      </div>

      <div class="col-md-8">
        <div class="card p-3">
          <h4 class="text-dark">Student Records</h4>

          <div class="table-responsive">
            <table class="table table-bordered mt-3 text-center table-sm">
              <thead class="table-dark">
                <tr>
                  <th>Name</th>
                  <th>Roll No</th>
                  <th>Sub1</th>
                  <th>Sub2</th>
                  <th>Sub3</th>
                  <th>Sub4</th>
                  <th>Sub5</th>
                  <th>Total</th>
                  <th>Grade</th>
                  <th>Result</th>
                </tr>
              </thead>
              <tbody id="tableBody"></tbody>
            </table>

          </div>
        </div>

      </div>
    </div>

    <script>
      const btn = document.getElementById("addBtn");
      const tableBody = document.getElementById("tableBody");

      btn.addEventListener("click", function () {

        let name = document.getElementById("name").value;
        let roll = document.getElementById("roll").value;
        let m1 = Number(document.getElementById("m1").value);
        let m2 = Number(document.getElementById("m2").value);
        let m3 = Number(document.getElementById("m3").value);
        let m4 = Number(document.getElementById("m4").value);
        let m5 = Number(document.getElementById("m5").value);

        if (!name || !roll || isNaN(m1) || isNaN(m2) || isNaN(m3) || isNaN(m4) || isNaN(m5)) {
          alert("Fill all fields");
          return;
        }


        let total = m1 + m2 + m3 + m4 + m5;
        let avg = total / 5;

        let grade = "";
        let result = "";

        if (avg >= 90) grade = "A+";
        else if (avg >= 75) grade = "A";
        else if (avg >= 60) grade = "B";
        else if (avg >= 50) grade = "C";
        else grade = "F";

        result = avg >= 50 ? "Pass" : "Fail";


        let row = document.createElement("tr");

        row.innerHTML = `
    <td>${name}</td>
    <td>${roll}</td>
    <td>${m1}</td>
    <td>${m2}</td>
    <td>${m3}</td>
    <td>${m4}</td>
    <td>${m5}</td>
    <td>${total}</td>
    <td>${grade}</td>
    <td>${result}</td>
  `;

        tableBody.appendChild(row);


        document.getElementById("name").value = "";
        document.getElementById("roll").value = "";
        document.getElementById("m1").value = "";
        document.getElementById("m2").value = "";
        document.getElementById("m3").value = "";
        document.getElementById("m4").value = "";
        document.getElementById("m5").value = "";

      });
    </script>

</body>

</html>
